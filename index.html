<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>寶可夢抽卡模擬器 - Pokémon Draw</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e40af, #6b21a8, #312e81);
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      color: white;
    }
    .card {
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card:hover {
      transform: scale(1.12) rotate(3deg);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
    }
    .gradient-text {
      background: linear-gradient(to right, #facc15, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    /* 優化後的錯誤訊息樣式 */
    .error-box {
      background: linear-gradient(135deg, #fefce8, #fef3c7);
      color: #854d0e;
      border: 3px solid #facc15;
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.2);
    }
  </style>
</head>
<body>
  <div class="max-w-6xl mx-auto p-8">
    <div class="text-center mb-12">
      <h1 class="text-6xl font-bold mb-4 flex items-center justify-center gap-4">
        🎴 <span class="gradient-text">寶可夢抽卡模擬器</span>
      </h1>
      <p class="text-xl text-yellow-200">使用 Pokémon TCG API • 每次隨機抽 5 張卡片</p>
    </div>

    <!-- 開包區 -->
    <div id="pack" class="flex flex-col items-center justify-center my-16 cursor-pointer group">
      <div class="relative">
        <i class="fas fa-gift text-[180px] text-yellow-300 group-active:scale-95 transition-transform"></i>
        <div class="absolute -top-6 -right-6 bg-red-500 text-white text-xs px-3 py-1 rounded-full font-bold rotate-12 shadow">5 張</div>
      </div>
      <p class="mt-6 text-3xl font-bold tracking-wide">點我開包！</p>
    </div>

    <!-- 卡片區 -->
    <div id="cards" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6 min-h-[400px]"></div>

    <!-- 再抽按鈕 -->
    <div class="flex justify-center mt-16">
      <button id="drawBtn"
              class="px-14 py-6 bg-gradient-to-r from-yellow-400 to-amber-500 hover:from-yellow-500 hover:to-amber-600 text-black font-bold text-2xl rounded-3xl shadow-2xl flex items-center gap-4 active:scale-95 transition-all">
        <i class="fas fa-dice"></i>
        再抽一次！
      </button>
    </div>

    <p class="text-center text-sm text-white/60 mt-12">資料來自 Pokémon TCG API • 純娛樂用途</p>
  </div>

  <script>
    async function drawCards() {
      const container = document.getElementById('cards');
      container.innerHTML = `
        <div class="col-span-full text-center py-20">
          <i class="fas fa-spinner fa-spin text-5xl text-yellow-300"></i>
          <p class="mt-6 text-xl">正在開包中...</p>
        </div>`;

      try {
        const res = await fetch('https://api.pokemontcg.io/v2/cards?q=supertype:Pokémon&orderBy=name&pageSize=50');
        
        if (!res.ok) throw new Error(`HTTP 錯誤: ${res.status}`);

        const data = await res.json();
        const allCards = data.data || [];

        if (allCards.length === 0) throw new Error('沒有找到卡片資料');

        const selected = [];
        for (let i = 0; i < 5; i++) {
          const randomIndex = Math.floor(Math.random() * allCards.length);
          selected.push(allCards[randomIndex]);
        }

        container.innerHTML = '';

        selected.forEach(card => {
          const div = document.createElement('div');
          div.className = 'card bg-white/10 backdrop-blur-xl rounded-3xl overflow-hidden border border-white/30 shadow-xl';
          div.innerHTML = `
            <div class="relative">
              <img src="${card.images.large || card.images.small}" 
                   class="w-full aspect-[3/4] object-cover" 
                   alt="${card.name}"
                   onerror="this.src='https://via.placeholder.com/400x560/334155/ffffff?text=卡片載入失敗'">
              ${card.rarity ? `<div class="absolute top-3 right-3 bg-black/70 text-yellow-300 text-xs px-3 py-1 rounded-full">${card.rarity}</div>` : ''}
            </div>
            <div class="p-5 text-center">
              <p class="font-bold text-lg leading-tight">${card.name}</p>
              ${card.set ? `<p class="text-xs text-white/60 mt-1">${card.set.name}</p>` : ''}
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        // 【優化後的錯誤訊息】
        container.innerHTML = `
          <div class="col-span-full">
            <div class="error-box mx-auto max-w-md">
              <i class="fas fa-exclamation-triangle text-6xl mb-4 text-amber-500"></i>
              <h3 class="text-2xl font-bold mb-2">哎呀～</h3>
              <p class="text-lg mb-4">寶可夢們正在休息中！</p>
              <p class="text-base mb-6">API 暫時無法連線，請稍後再試～</p>
              <button onclick="drawCards()" 
                      class="px-8 py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold text-lg rounded-2xl shadow-inner flex items-center gap-3 mx-auto">
                <i class="fas fa-redo"></i>
                再試一次！
              </button>
              <p class="text-xs text-amber-700 mt-6">${err.message}</p>
            </div>
          </div>`;
        console.error('抽卡錯誤:', err);
      }
    }

    // 頁面載入後綁定事件 + 第一次自動抽卡
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('drawBtn').addEventListener('click', drawCards);
      document.getElementById('pack').addEventListener('click', drawCards);
      
      // 第一次進入頁面自動抽一次
      drawCards();
    });
  </script>
</body>
</html>
